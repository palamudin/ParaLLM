<html lang="en" data-bs-theme="dark"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ParaLLM Button Lab</title>
  <style>
    :root {
      --rs-bg: #09111d;
      --rs-bg-soft: #0f1724;
      --rs-surface: rgba(10, 20, 32, 0.92);
      --rs-surface-strong: rgba(14, 26, 40, 0.97);
      --rs-surface-muted: rgba(20, 34, 52, 0.84);
      --rs-border: rgba(148, 163, 184, 0.18);
      --rs-border-strong: rgba(96, 165, 250, 0.32);
      --rs-text: #e5edf8;
      --rs-muted: #9caec6;
      --rs-accent: #4ea1ff;
      --rs-accent-soft: rgba(78, 161, 255, 0.16);
      --rs-success: #2dd4bf;
      --rs-success-soft: rgba(45, 212, 191, 0.16);
      --rs-body:
        radial-gradient(circle at top left, rgba(78, 161, 255, 0.12), transparent 26%),
        radial-gradient(circle at bottom right, rgba(45, 212, 191, 0.10), transparent 24%),
        linear-gradient(180deg, #08111d 0%, #0b1523 52%, #101a2b 100%);
    }

    @property --spin {
      syntax: "<angle>";
      inherits: false;
      initial-value: 0deg;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    html {
      background: var(--rs-body);
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      color: var(--rs-text);
      background: var(--rs-body);
      font-family: "Segoe UI", Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .lab-stage {
      position: relative;
      width: min(860px, calc(100vw - 48px));
      min-height: 100vh;
      display: grid;
      place-items: center;
      isolation: isolate;
    }

    .lab-stage::before {
      content: "";
      position: absolute;
      inset: 32px;
      z-index: -2;
      border-radius: 5px;
      background:
        radial-gradient(circle at 50% 100%, rgba(56, 189, 248, 0.12), transparent 38%),
        linear-gradient(180deg, rgba(8, 17, 29, 0.04), rgba(8, 17, 29, 0.36));
      border: 1px solid rgba(96, 165, 250, 0.12);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      pointer-events: none;
    }

    .para-actuator-wrap {
      position: relative;
      display: grid;
      place-items: center;
      perspective: 900px;
      transform: translateY(-34px);
    }

    .para-actuator-wrap::after {
      content: "";
      position: absolute;
      left: 12%;
      right: 12%;
      bottom: -24px;
      height: 26px;
      border-radius: 999px;
      background: radial-gradient(ellipse at center, rgba(78, 161, 255, 0.34), transparent 68%);
      filter: blur(10px);
      opacity: calc(0.22 + (var(--active, 0) * 0.46));
      transform: scaleX(calc(0.86 + (var(--active, 0) * 0.16)));
      transition: opacity 240ms ease, transform 240ms ease;
      pointer-events: none;
    }

    .para-actuator {
      --active: 0;
      --hue: 210;
      --edge: 1;
      --lift: 0.74;
      --body: 0.52;
      --body-hue: 212;
      --body-sat: 42%;
      --body-light: 14%;
      --body-top-light: 51%;
      --body-mid-light: 14%;
      --body-low-light: 10%;
      --glow: 0.92;
      --gloss: 0.10;
      position: relative;
      width: min(360px, 78vw);
      min-height: 118px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      grid-template-areas:
        "title indicator"
        "state indicator";
      align-items: center;
      column-gap: 18px;
      padding: 24px 28px;
      border: 1px solid rgba(96, 165, 250, 0.24);
      border-radius: 5px;
      color: var(--rs-text);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, calc(var(--gloss) * 0.18)), rgba(255, 255, 255, calc(var(--gloss) * 0.035)) 34%, transparent 52%),
        radial-gradient(circle at 22% 0%, rgba(96, 165, 250, calc(0.08 + var(--glow) * 0.16)), transparent 38%),
        linear-gradient(180deg,
          hsl(var(--body-hue) var(--body-sat) var(--body-top-light)),
          hsl(var(--body-hue) var(--body-sat) var(--body-mid-light)) 68%,
          hsl(var(--body-hue) var(--body-sat) var(--body-low-light)));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, calc(0.08 + var(--edge) * 0.12)),
        inset 0 -18px 28px rgba(0, 0, 0, 0.22),
        inset 0 -1px 0 rgba(255, 255, 255, 0.04),
        0 calc(5px + var(--lift) * 7px) 0 rgba(2, 7, 13, calc(0.72 + var(--edge) * 0.16)),
        0 calc(16px + var(--lift) * 18px) calc(28px + var(--lift) * 28px) rgba(0, 0, 0, calc(0.28 + var(--edge) * 0.26)),
        0 0 0 calc(1px + var(--edge) * 1px) rgba(96, 165, 250, calc(var(--edge) * 0.12));
      cursor: pointer;
      appearance: none;
      transform: translateY(0) rotateX(0deg);
      transition:
        transform 180ms cubic-bezier(.2, .9, .2, 1),
        border-color 220ms ease,
        box-shadow 220ms ease,
        background 220ms ease;
      overflow: visible;
      isolation: isolate;
    }

    .para-actuator::before {
      content: "";
      position: absolute;
      inset: -2px;
      z-index: -2;
      border-radius: 5px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, calc(var(--edge) * 0.11)), rgba(255, 255, 255, 0.015)),
        radial-gradient(circle at 50% 115%, rgba(78, 161, 255, calc(var(--glow) * 0.12)), transparent 48%),
        linear-gradient(180deg, rgba(8, 18, 30, 0.93), rgba(3, 8, 14, 0.96));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, calc(var(--edge) * 0.13)),
        inset 0 12px 18px rgba(0, 0, 0, 0.24),
        0 1px 2px rgba(255, 255, 255, 0.04),
        0 0 0 1px rgba(96, 165, 250, calc(var(--edge) * 0.18)),
        0 18px 54px rgba(0, 0, 0, calc(0.18 + var(--edge) * 0.22));
    }

    .para-actuator::after {
      content: "";
      position: absolute;
      inset: 1px;
      z-index: -1;
      border-radius: 5px;
      background:
        linear-gradient(115deg, transparent 0 19%, rgba(255, 255, 255, calc(var(--gloss) * 0.34)) 22%, transparent 27% 100%),
        radial-gradient(circle at 88% 8%, hsla(var(--hue), 96%, 66%, calc(0.08 + var(--active) * 0.16)), transparent 30%);
      opacity: calc(0.42 + var(--gloss) * 0.62);
      mix-blend-mode: screen;
      pointer-events: none;
    }

    .para-actuator:hover,
    .para-actuator:focus-visible {
      border-color: hsla(var(--hue), 92%, 67%, 0.54);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.14),
        inset 0 -18px 28px rgba(0, 0, 0, 0.18),
        inset 0 -1px 0 rgba(255, 255, 255, 0.05),
        0 calc(5px + var(--lift) * 7px) 0 rgba(4, 10, 18, 0.86),
        0 0 0 1px hsla(var(--hue), 96%, 64%, calc(var(--edge) * 0.16)),
        0 28px 52px rgba(0, 0, 0, calc(0.34 + var(--edge) * 0.16)),
        0 0 34px hsla(var(--hue), 96%, 60%, calc(0.05 + var(--glow) * 0.18));
    }

    .para-actuator:focus-visible {
      outline: 2px solid hsla(var(--hue), 96%, 66%, 0.5);
      outline-offset: 8px;
    }

    .para-actuator:active,
    .para-actuator.is-pressing {
      transform: translateY(7px) rotateX(3deg);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        inset 0 12px 28px rgba(0, 0, 0, 0.34),
        inset 0 -1px 0 rgba(255, 255, 255, 0.03),
        0 2px 0 rgba(4, 10, 18, 0.92),
        0 15px 28px rgba(0, 0, 0, 0.34),
        0 0 26px hsla(var(--hue), 96%, 60%, calc(0.06 + var(--active) * var(--glow) * 0.24));
    }

    .para-actuator[data-mode="armed"] {
      --active: 0.55;
      --hue: 195;
    }

    .para-actuator[data-mode="live"] {
      --active: 1;
      --hue: 210;
    }

    .actuator-spark {
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      pointer-events: none;
      opacity: calc(0.16 + (var(--active) * 0.54));
      background:
        conic-gradient(from var(--spin, 0deg), transparent 0deg, transparent 52deg, hsla(var(--hue), 100%, 70%, 0.68) 64deg, transparent 88deg, transparent 360deg);
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      padding: 1px;
      animation: actuator-spin 4.8s linear infinite;
    }

    .actuator-depth {
      position: absolute;
      inset: 10px;
      z-index: -1;
      border-radius: 10px;
      box-shadow:
        inset 0 8px 13px rgba(0, 0, 0, 0.22),
        inset 0 -1px 0 rgba(255, 255, 255, 0.04);
      filter: blur(0.2px);
      pointer-events: none;
    }

    .actuator-title {
      grid-area: title;
      position: relative;
      z-index: 1;
      display: block;
      margin-bottom: 7px;
      color: rgba(242, 248, 255, 0.92);
      font-size: 0.86rem;
      font-weight: 850;
      letter-spacing: 0;
      text-align: left;
      text-transform: uppercase;
      text-shadow:
        0 1px 1px rgba(0, 0, 0, 0.9),
        0 -1px 0 rgba(255, 255, 255, 0.08),
        0 0 14px hsla(var(--hue), 96%, 68%, calc(0.04 + var(--active) * 0.28));
    }

    .actuator-state {
      grid-area: state;
      position: relative;
      z-index: 1;
      min-height: 24px;
      display: block;
      color: var(--rs-muted);
      font-family: "Cascadia Mono", "SFMono-Regular", Consolas, monospace;
      font-size: 0.76rem;
      font-weight: 800;
      overflow: hidden;
      text-transform: uppercase;
    }

    .actuator-state span {
      position: absolute;
      inset: 0 auto auto 0;
      opacity: 0;
      transform: translateY(16px) scale(0.98);
      filter: blur(2px);
      transition: opacity 220ms ease, transform 260ms cubic-bezier(.2, .9, .2, 1), filter 220ms ease, color 220ms ease;
      white-space: nowrap;
    }

    .para-actuator[data-mode="off"] .state-off,
    .para-actuator[data-mode="armed"] .state-armed,
    .para-actuator[data-mode="live"] .state-live {
      opacity: 1;
      transform: translateY(0) scale(1);
      filter: blur(0);
      color: hsla(var(--hue), 92%, 75%, calc(0.62 + var(--active) * 0.28));
    }

    .actuator-indicator {
      grid-area: indicator;
      position: relative;
      z-index: 1;
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background:
        radial-gradient(circle at 50% 42%, hsla(var(--hue), 100%, 68%, calc(0.12 + var(--active) * 0.66)), transparent 25%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.01)),
        rgba(6, 14, 24, 0.86);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        inset 0 10px 20px rgba(0, 0, 0, 0.24),
        0 1px 0 rgba(255, 255, 255, 0.05),
        0 0 20px hsla(var(--hue), 100%, 62%, calc(var(--active) * 0.24));
    }

    .actuator-indicator::before {
      content: "";
      width: 14px;
      height: 14px;
      border-radius: 999px;
      background: hsla(var(--hue), 100%, 70%, calc(0.28 + var(--active) * 0.72));
      box-shadow:
        0 0 12px hsla(var(--hue), 100%, 68%, calc(0.16 + var(--active) * 0.56)),
        0 0 30px hsla(var(--hue), 100%, 62%, calc(var(--active) * 0.36));
      transform: scale(calc(0.72 + var(--active) * 0.34));
      transition: transform 240ms ease, background 240ms ease, box-shadow 240ms ease;
    }

    .actuator-orbit {
      position: absolute;
      inset: 7px;
      z-index: 0;
      border-radius: 11px;
      overflow: hidden;
      pointer-events: none;
      opacity: calc(var(--active) * 0.46);
      transition: opacity 260ms ease;
    }

    .actuator-orbit i {
      position: absolute;
      left: 50%;
      top: 50%;
      width: var(--size);
      height: var(--size);
      border-radius: 999px;
      background: hsla(var(--hue), 100%, 74%, 0.78);
      box-shadow: 0 0 12px hsla(var(--hue), 100%, 66%, 0.58);
      transform-origin: calc(var(--distance) * -1) 50%;
      animation: orbit var(--duration) linear infinite;
      animation-delay: calc(var(--delay) * -1s);
    }

    .lab-caption {
      position: absolute;
      left: 50%;
      bottom: 74px;
      transform: translateX(-50%);
      color: var(--rs-muted);
      font-size: 0.78rem;
      text-align: center;
      opacity: 0.72;
    }

    .lab-controls {
      position: absolute;
      left: 50%;
      bottom: 46px;
      width: min(760px, calc(100vw - 40px));
      transform: translateX(-50%);
      display: grid;
      gap: 12px;
      padding: 14px;
      border: 1px solid rgba(96, 165, 250, 0.14);
      border-radius: 14px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.035), transparent 54%),
        rgba(7, 17, 29, 0.78);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.055),
        0 20px 44px rgba(0, 0, 0, 0.20);
      backdrop-filter: blur(18px);
    }

    .preset-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 7px;
    }

    .preset-button {
      min-height: 31px;
      padding: 6px 12px;
      border: 1px solid rgba(96, 165, 250, 0.22);
      border-radius: 9px;
      background: rgba(13, 28, 47, 0.82);
      color: var(--rs-muted);
      font-size: 0.74rem;
      font-weight: 750;
      cursor: pointer;
      appearance: none;
      transition: border-color 150ms ease, background 150ms ease, color 150ms ease, transform 150ms ease;
    }

    .preset-button:hover,
    .preset-button:focus-visible,
    .preset-button.is-selected {
      border-color: rgba(96, 165, 250, 0.54);
      background: rgba(24, 53, 89, 0.88);
      color: #f2f7ff;
    }

    .preset-button:active {
      transform: translateY(1px);
    }

    .slider-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .slider-grid-color {
      grid-template-columns: repeat(5, minmax(0, 1fr));
    }

    .slider-field {
      display: grid;
      gap: 6px;
      color: var(--rs-muted);
      font-size: 0.68rem;
      font-weight: 760;
      text-transform: uppercase;
    }

    .slider-field span {
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .slider-field output {
      color: rgba(229, 237, 248, 0.82);
      font-variant-numeric: tabular-nums;
    }

    .slider-field input[type="range"] {
      width: 100%;
      accent-color: var(--rs-accent);
      cursor: pointer;
    }

    @keyframes actuator-spin {
      to {
        --spin: 360deg;
      }
    }

    @keyframes orbit {
      from {
        transform: rotate(0deg) translateX(var(--distance));
      }
      to {
        transform: rotate(360deg) translateX(var(--distance));
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }
    }

    @media (max-width: 560px) {
      body {
        overflow: auto;
      }

      .lab-stage {
        min-height: 900px;
      }

      .lab-stage::before {
        inset: 16px;
      }

      .para-actuator-wrap {
        transform: translateY(-120px);
      }

      .para-actuator {
        width: min(320px, 84vw);
        min-height: 106px;
        padding: 20px 22px;
      }

      .actuator-indicator {
        width: 48px;
        height: 48px;
      }

      .slider-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="lab-stage" aria-label="ParaLLM polished button prototype">
    <div class="para-actuator-wrap" style="--active: 0">
      <button class="para-actuator" type="button" data-mode="off" aria-label="Worker context off" aria-pressed="false" data-accent-hue="218" style="--edge: 1.00; --lift: 0.74; --body: 0.52; --body-top-light: 21.3%; --body-mid-light: 14.2%; --body-low-light: 10.6%; --glow: 0.96; --gloss: 0.09; --body-hue: 225; --body-sat: 42%; --body-light: 14%; --hue: 218;">
        <span class="actuator-spark" aria-hidden="true"></span>
        <span class="actuator-depth" aria-hidden="true"></span>
        <span class="actuator-orbit" aria-hidden="true"><i style="--size: 1.17px; --distance: 77.1px; --duration: 11.95s; --delay: 6.34;"></i><i style="--size: 1.73px; --distance: 110.1px; --duration: 7.19s; --delay: 6.06;"></i><i style="--size: 1.63px; --distance: 51.8px; --duration: 15.99s; --delay: 0.51;"></i><i style="--size: 3.19px; --distance: 110.2px; --duration: 15.03s; --delay: 14.72;"></i><i style="--size: 2.45px; --distance: 59.6px; --duration: 18.47s; --delay: 16.47;"></i><i style="--size: 3.71px; --distance: 107.2px; --duration: 8.46s; --delay: 6.45;"></i><i style="--size: 1.64px; --distance: 68.8px; --duration: 11.06s; --delay: 5.98;"></i><i style="--size: 1.76px; --distance: 61.3px; --duration: 15.52s; --delay: 13.06;"></i><i style="--size: 3.64px; --distance: 42.4px; --duration: 14.16s; --delay: 10.82;"></i><i style="--size: 2.81px; --distance: 105.8px; --duration: 12.01s; --delay: 1.77;"></i><i style="--size: 2.28px; --distance: 65.9px; --duration: 8.40s; --delay: 5.13;"></i><i style="--size: 1.67px; --distance: 102.2px; --duration: 13.62s; --delay: 0.48;"></i><i style="--size: 3.30px; --distance: 45.8px; --duration: 11.14s; --delay: 6.71;"></i><i style="--size: 2.06px; --distance: 122.0px; --duration: 8.70s; --delay: 1.75;"></i><i style="--size: 1.46px; --distance: 105.2px; --duration: 18.39s; --delay: 17.05;"></i><i style="--size: 3.12px; --distance: 97.8px; --duration: 18.07s; --delay: 12.26;"></i><i style="--size: 2.03px; --distance: 41.2px; --duration: 11.72s; --delay: 8.61;"></i><i style="--size: 1.20px; --distance: 83.3px; --duration: 14.40s; --delay: 10.19;"></i><i style="--size: 1.22px; --distance: 59.1px; --duration: 9.50s; --delay: 5.03;"></i><i style="--size: 2.89px; --distance: 65.6px; --duration: 10.49s; --delay: 9.31;"></i><i style="--size: 2.15px; --distance: 112.6px; --duration: 16.44s; --delay: 0.39;"></i><i style="--size: 2.87px; --distance: 102.9px; --duration: 7.65s; --delay: 3.85;"></i><i style="--size: 2.07px; --distance: 44.1px; --duration: 14.72s; --delay: 14.05;"></i><i style="--size: 3.17px; --distance: 59.0px; --duration: 15.84s; --delay: 5.11;"></i><i style="--size: 2.82px; --distance: 100.8px; --duration: 18.44s; --delay: 17.73;"></i><i style="--size: 1.86px; --distance: 97.4px; --duration: 7.10s; --delay: 4.32;"></i></span>
        <span class="actuator-title">Worker context</span>
        <span class="actuator-state" aria-hidden="true">
          <span class="state-off">Off / clean lane</span>
          <span class="state-armed">Light workers</span>
          <span class="state-live">Full workers</span>
        </span>
        <span class="actuator-indicator" aria-hidden="true"></span>
      </button>
    </div>
    <section class="lab-controls" aria-label="Button visual tuning controls">
      <div class="preset-row" role="group" aria-label="Visual presets">
        <button class="preset-button" type="button" data-preset="executive">Executive</button>
        <button class="preset-button" type="button" data-preset="crystal">Crystal edge</button>
        <button class="preset-button" type="button" data-preset="submarine">Submarine</button>
        <button class="preset-button" type="button" data-preset="console">Console glow</button>
        <button class="preset-button" type="button" data-preset="blackglass">Black glass</button>
      </div>
      <div class="slider-grid">
        <label class="slider-field">
          <span>Separation <output data-output-for="edge">100</output></span>
          <input type="range" min="0" max="100" value="72" data-style-var="edge">
        </label>
        <label class="slider-field">
          <span>Lift <output data-output-for="lift">74</output></span>
          <input type="range" min="0" max="100" value="74" data-style-var="lift">
        </label>
        <label class="slider-field">
          <span>Body shade <output data-output-for="body">52</output></span>
          <input type="range" min="0" max="100" value="52" data-style-var="body">
        </label>
        <label class="slider-field">
          <span>Glow <output data-output-for="glow">96</output></span>
          <input type="range" min="0" max="100" value="52" data-style-var="glow">
        </label>
        <label class="slider-field">
          <span>Gloss <output data-output-for="gloss">9</output></span>
          <input type="range" min="0" max="100" value="46" data-style-var="gloss">
        </label>
      </div>
      <div class="slider-grid slider-grid-color">
        <label class="slider-field">
          <span>Body hue <output data-output-for="bodyHue">225</output></span>
          <input type="range" min="185" max="250" value="212" data-color-var="bodyHue">
        </label>
        <label class="slider-field">
          <span>Body sat <output data-output-for="bodySat">42</output></span>
          <input type="range" min="12" max="82" value="42" data-color-var="bodySat">
        </label>
        <label class="slider-field">
          <span>Body light <output data-output-for="bodyLight">14</output></span>
          <input type="range" min="5" max="30" value="14" data-color-var="bodyLight">
        </label>
        <label class="slider-field">
          <span>Accent hue <output data-output-for="accentHue">218</output></span>
          <input type="range" min="178" max="260" value="210" data-color-var="accentHue">
        </label>
        <label class="slider-field">
          <span>Accent punch <output data-output-for="accentPunch">100</output></span>
          <input type="range" min="40" max="140" value="100" data-color-var="accentPunch">
        </label>
      </div>
    </section>
  </main>

  <script>
    const button = document.querySelector(".para-actuator");
    const wrap = document.querySelector(".para-actuator-wrap");
    const orbit = document.querySelector(".actuator-orbit");
    const presetButtons = Array.from(document.querySelectorAll("[data-preset]"));
    const sliders = Array.from(document.querySelectorAll("[data-style-var]"));
    const colorSliders = Array.from(document.querySelectorAll("[data-color-var]"));
    const outputs = new Map(Array.from(document.querySelectorAll("[data-output-for]")).map((output) => [output.dataset.outputFor, output]));
    const states = [
      { mode: "off", label: "Worker context off", active: "0", pressed: "false" },
      { mode: "armed", label: "Worker context light workers", active: "0.55", pressed: "mixed" },
      { mode: "live", label: "Worker context full workers", active: "1", pressed: "true" },
    ];
    const presets = {
      executive: { edge: 72, lift: 74, body: 52, glow: 52, gloss: 46, bodyHue: 212, bodySat: 42, bodyLight: 14, accentHue: 210, accentPunch: 100 },
      crystal: { edge: 92, lift: 66, body: 58, glow: 44, gloss: 78, bodyHue: 205, bodySat: 34, bodyLight: 17, accentHue: 197, accentPunch: 92 },
      submarine: { edge: 64, lift: 88, body: 28, glow: 36, gloss: 34, bodyHue: 220, bodySat: 32, bodyLight: 9, accentHue: 188, accentPunch: 78 },
      console: { edge: 80, lift: 70, body: 44, glow: 86, gloss: 52, bodyHue: 214, bodySat: 56, bodyLight: 12, accentHue: 206, accentPunch: 124 },
      blackglass: { edge: 88, lift: 82, body: 18, glow: 64, gloss: 88, bodyHue: 232, bodySat: 28, bodyLight: 7, accentHue: 216, accentPunch: 112 },
    };

    for (let i = 0; i < 26; i += 1) {
      const star = document.createElement("i");
      const size = 1 + Math.random() * 2.8;
      const distance = 20 + Math.random() * 108;
      const duration = 7 + Math.random() * 12;
      const delay = Math.random() * duration;
      star.style.setProperty("--size", size.toFixed(2) + "px");
      star.style.setProperty("--distance", distance.toFixed(1) + "px");
      star.style.setProperty("--duration", duration.toFixed(2) + "s");
      star.style.setProperty("--delay", delay.toFixed(2));
      orbit.appendChild(star);
    }

    function setState(nextIndex) {
      const state = states[nextIndex % states.length];
      button.dataset.mode = state.mode;
      button.setAttribute("aria-label", state.label);
      button.setAttribute("aria-pressed", state.pressed);
      wrap.style.setProperty("--active", state.active);
      button.style.setProperty("--hue", String(Math.round(Number(state.hue || button.dataset.accentHue || 210))));
    }

    function setVisualVar(name, value) {
      const numeric = Math.max(0, Math.min(100, Number(value) || 0));
      button.style.setProperty("--" + name, (numeric / 100).toFixed(2));
      const output = outputs.get(name);
      if (output) output.textContent = String(Math.round(numeric));
      if (name === "body") {
        updateBodyColorStops();
      }
    }

    function sliderValue(collection, attr, name, fallback) {
      const slider = collection.find((item) => item.dataset[attr] === name);
      return Number(slider?.value ?? fallback);
    }

    function updateBodyColorStops() {
      const body = Math.max(0, Math.min(100, sliderValue(sliders, "styleVar", "body", 52))) / 100;
      const baseLight = Math.max(5, Math.min(30, sliderValue(colorSliders, "colorVar", "bodyLight", 14)));
      const top = Math.max(6, Math.min(42, baseLight + body * 14));
      const mid = Math.max(4, Math.min(34, baseLight - 4 + body * 8));
      const low = Math.max(3, Math.min(28, baseLight - 6 + body * 5));
      button.style.setProperty("--body-top-light", top.toFixed(1) + "%");
      button.style.setProperty("--body-mid-light", mid.toFixed(1) + "%");
      button.style.setProperty("--body-low-light", low.toFixed(1) + "%");
    }

    function setColorVar(name, value) {
      const numeric = Number(value) || 0;
      const output = outputs.get(name);
      if (output) output.textContent = String(Math.round(numeric));
      if (name === "bodyHue") {
        button.style.setProperty("--body-hue", String(Math.round(numeric)));
      } else if (name === "bodySat") {
        button.style.setProperty("--body-sat", String(Math.round(numeric)) + "%");
      } else if (name === "bodyLight") {
        button.style.setProperty("--body-light", String(Math.round(numeric)) + "%");
        updateBodyColorStops();
      } else if (name === "accentHue") {
        button.dataset.accentHue = String(Math.round(numeric));
        button.style.setProperty("--hue", String(Math.round(numeric)));
      } else if (name === "accentPunch") {
        const punch = Math.max(40, Math.min(140, numeric)) / 100;
        button.style.setProperty("--glow", String(Math.max(0, Math.min(1, Number(sliders.find((item) => item.dataset.styleVar === "glow")?.value || 0) / 100 * punch)).toFixed(2)));
      }
    }

    function selectPreset(name) {
      const preset = presets[name];
      if (!preset) return;
      Object.entries(preset).forEach(([key, value]) => {
        const effectSlider = sliders.find((item) => item.dataset.styleVar === key);
        const colorSlider = colorSliders.find((item) => item.dataset.colorVar === key);
        if (effectSlider) {
          effectSlider.value = value;
          setVisualVar(key, value);
        }
        if (colorSlider) {
          colorSlider.value = value;
          setColorVar(key, value);
        }
      });
      presetButtons.forEach((item) => {
        item.classList.toggle("is-selected", item.dataset.preset === name);
      });
    }

    button.addEventListener("click", () => {
      const currentIndex = states.findIndex((state) => state.mode === button.dataset.mode);
      button.classList.add("is-pressing");
      setState(currentIndex + 1);
      window.setTimeout(() => button.classList.remove("is-pressing"), 170);
    });

    presetButtons.forEach((item) => {
      item.addEventListener("click", () => selectPreset(item.dataset.preset));
    });

    sliders.forEach((slider) => {
      slider.addEventListener("input", () => {
        setVisualVar(slider.dataset.styleVar, slider.value);
        const accentPunch = colorSliders.find((item) => item.dataset.colorVar === "accentPunch");
        if (slider.dataset.styleVar === "glow" && accentPunch) {
          setColorVar("accentPunch", accentPunch.value);
        }
        presetButtons.forEach((item) => item.classList.remove("is-selected"));
      });
    });

    colorSliders.forEach((slider) => {
      slider.addEventListener("input", () => {
        setColorVar(slider.dataset.colorVar, slider.value);
        presetButtons.forEach((item) => item.classList.remove("is-selected"));
      });
    });

    
  </script>


</body></html>
